<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manufacturing Defect Detector</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --border: #2a2e3a;
    --text: #e8e9ed;
    --muted: #9a9eac;
    --accent: #5b8def;
    --accent-soft: rgba(91, 141, 239, 0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  .api-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  .dot.ok { background: #4ade80; }
  .dot.bad { background: #f87171; }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--panel);
  }
  .dropzone.dragover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .dropzone p { margin: 0; color: var(--muted); font-size: 14px; }
  .dropzone .hint { font-size: 12px; margin-top: 6px; color: #6b6f7d; }
  input[type="file"] { display: none; }

  .preview-row {
    display: flex;
    gap: 16px;
    margin-top: 24px;
  }
  .panel {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 0 0 10px; }
  .panel img { width: 100%; border-radius: 6px; display: block; }

  .result {
    margin-top: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .pred-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .pred-class { font-size: 20px; font-weight: 600; text-transform: capitalize; }
  .pred-conf { font-size: 13px; color: var(--muted); }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .bar-label { width: 110px; color: var(--muted); text-transform: capitalize; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: #232733; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .bar-pct { width: 48px; text-align: right; color: var(--muted); flex-shrink: 0; }

  .loading, .error {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 14px;
  }
  .loading { background: var(--accent-soft); color: var(--accent); }
  .error { background: rgba(248, 113, 113, 0.12); color: #f87171; }

  button.reset {
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  button.reset:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <h1>Manufacturing Defect Detector</h1>
  <p class="subtitle">Upload a steel surface image to classify the defect and view the Grad-CAM attention heatmap.</p>

  <div class="api-status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking API...</span>
  </div>

  <div class="dropzone" id="dropzone">
    <p>Drag & drop an image here, or click to browse</p>
    <p class="hint">JPG/PNG · steel surface defect image</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="previewRow" class="preview-row" style="display:none;">
    <div class="panel">
      <h3>Original</h3>
      <img id="originalImg" alt="Uploaded image">
    </div>
    <div class="panel">
      <h3>Grad-CAM Heatmap</h3>
      <img id="heatmapImg" alt="Grad-CAM overlay">
    </div>
  </div>

  <div id="loading" class="loading" style="display:none;">Running inference...</div>
  <div id="errorBox" class="error" style="display:none;"></div>

  <div id="result" class="result" style="display:none;">
    <div class="pred-row">
      <div class="pred-class" id="predClass">—</div>
      <div class="pred-conf" id="predConf">—</div>
    </div>
    <div id="bars"></div>
  </div>

  <button class="reset" id="resetBtn" style="display:none;">Upload another image</button>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const previewRow = document.getElementById("previewRow");
const originalImg = document.getElementById("originalImg");
const heatmapImg = document.getElementById("heatmapImg");
const loading = document.getElementById("loading");
const errorBox = document.getElementById("errorBox");
const resultBox = document.getElementById("result");
const predClass = document.getElementById("predClass");
const predConf = document.getElementById("predConf");
const bars = document.getElementById("bars");
const resetBtn = document.getElementById("resetBtn");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

// --- API health check on load ---
async function checkHealth() {
  try {
    const res = await fetch(`${API_BASE}/health`);
    const data = await res.json();
    if (data.model_loaded) {
      statusDot.className = "dot ok";
      statusText.textContent = "API connected, model loaded";
    } else {
      statusDot.className = "dot bad";
      statusText.textContent = "API connected, but model not loaded";
    }
  } catch (e) {
    statusDot.className = "dot bad";
    statusText.textContent = "Cannot reach API — is uvicorn running on port 8000?";
  }
}
checkHealth();

// --- Dropzone interactions ---
dropzone.addEventListener("click", () => fileInput.click());

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("dragover");
});
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("dragover");
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

resetBtn.addEventListener("click", () => {
  previewRow.style.display = "none";
  resultBox.style.display = "none";
  errorBox.style.display = "none";
  resetBtn.style.display = "none";
  fileInput.value = "";
});

// --- Core flow ---
async function handleFile(file) {
  errorBox.style.display = "none";
  resultBox.style.display = "none";
  resetBtn.style.display = "none";

  // Show original image immediately
  const localUrl = URL.createObjectURL(file);
  originalImg.src = localUrl;
  heatmapImg.src = "";
  previewRow.style.display = "flex";
  loading.style.display = "block";

  try {
    // Two parallel calls: one for full probability breakdown, one for the heatmap
    const formData1 = new FormData();
    formData1.append("file", file);
    const formData2 = new FormData();
    formData2.append("file", file);

    const [predictRes, gradcamRes] = await Promise.all([
      fetch(`${API_BASE}/predict`, { method: "POST", body: formData1 }),
      fetch(`${API_BASE}/predict/gradcam`, { method: "POST", body: formData2 }),
    ]);

    if (!predictRes.ok || !gradcamRes.ok) {
      const errData = await (predictRes.ok ? gradcamRes : predictRes).json().catch(() => ({}));
      throw new Error(errData.detail || "Request failed");
    }

    const predictData = await predictRes.json();
    const gradcamData = await gradcamRes.json();

    loading.style.display = "none";
    heatmapImg.src = `data:image/png;base64,${gradcamData.gradcam_overlay_png_base64}`;

    renderResult(predictData.predicted_class, predictData.confidence, predictData.all_probabilities);
  } catch (err) {
    loading.style.display = "none";
    errorBox.textContent = err.message || "Something went wrong calling the API.";
    errorBox.style.display = "block";
  }

  resetBtn.style.display = "inline-block";
}

function renderResult(predictedClass, confidence, allProbabilities) {
  predClass.textContent = predictedClass;
  predConf.textContent = `${(confidence * 100).toFixed(1)}% confidence`;
  resultBox.style.display = "block";

  bars.innerHTML = "";
  const sorted = Object.entries(allProbabilities).sort((a, b) => b[1] - a[1]);

  for (const [className, prob] of sorted) {
    const pct = (prob * 100).toFixed(1);
    const row = document.createElement("div");
    row.className = "bar-row";
    row.innerHTML = `
      <div class="bar-label">${className}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-pct">${pct}%</div>
    `;
    bars.appendChild(row);
  }
}
</script>
</body>
</html>
